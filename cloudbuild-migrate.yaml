steps:
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache openssl openssl-dev libc6-compat && \
        npm ci && \
        npx prisma generate && \
        npx prisma db push --accept-data-loss
    env:
      - 'DATABASE_URL=postgresql://postgres:43#7B.<a{<1~Y,r@/karyakram_manager?host=/cloudsql/promptwars-virtual-493516:us-central1:karyakram-db'

options:
  logging: CLOUD_LOGGING_ONLY
